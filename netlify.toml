# Application-specific redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/signup.html"
  status = 200

[[redirects]]
  from = "/explore"
  to = "/index.html"
  status = 301

# Catch-all for SPA routing (legitimate app routes)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  port = 4000

[functions]
  node_bundler = "esbuild"